services:
  arminator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arminator-webapp
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8001}:8000"
    environment:
      PORT: "8000"
      JOBS_DIR: /app/instance/jobs
      OPENSCAD_BIN: openscad
      OPENSCAD_USE_XVFB: "1"
      MAX_RENDER_WORKERS: "1"
      JOB_RETENTION_HOURS: "168"
    volumes:
      - ./instance/jobs:/app/instance/jobs
