name: Repo Hygiene

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run repo hygiene check
        run: bash scripts/check_repo_hygiene.sh
